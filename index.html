<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hokffx Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #001f3f, #000814 70%);
    color: white;
}

body::before {
    content: "";
    position: fixed;
    width: 600px;
    height: 600px;
    background: #ff003c;
    filter: blur(250px);
    top: -200px;
    left: -200px;
    opacity: 0.4;
    z-index: -1;
}

.header {
    text-align: center;
    padding: 40px 20px;
}

.header h1 {
    font-size: 42px;
    font-weight: 800;
    background: linear-gradient(90deg, #fff, #ff003c);
    -webkit-background-clip: text;
    color: transparent;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 30px;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 25px;
    overflow: hidden;
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
}

.card img {
    width: 100%;
}

.content {
    padding: 20px;
}

.title {
    font-size: 22px;
    font-weight: 600;
}

.price {
    font-size: 28px;
    font-weight: 800;
    color: #ff4d6d;
}

.input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 20px;
    border: none;
    text-align: center;
}

.btn {
    display: block;
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 25px;
    background: linear-gradient(135deg, #ff003c, #ff4d6d);
    color: white;
    text-align: center;
    font-weight: bold;
    border: none;
    cursor: pointer;
}

.note {
    font-size: 12px;
    margin-top: 8px;
    color: #ccc;
}

.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.85);
}

.popup-box {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

.popup img {
    width: 200px;
}
</style>
</head>

<body>

<div class="header">
    <h1>Hokffx Store</h1>
</div>

<div class="container">

<!-- iPhone -->
<div class="card">
    <img src="iphone-auxilio.png">

    <div class="content">
        <div class="title">iPhone Auxilio</div>
        <div class="price">$6.40</div>

        <input type="email" id="email1" class="input" placeholder="Enter your Gmail">

        <!-- PAY -->
        <button class="btn"
        onclick="payNow('https://razorpay.me/@enjoymenthub?amount=%2FjgOm4sSt2cRPlGWeT7aQg%3D%3D')">
        💰 PAY NOW
        </button>

        <!-- ORDER -->
        <button class="btn" onclick="sendOrder('email1')">
        📩 SEND ORDER
        </button>

        <!-- INTERNATIONAL -->
        <button class="btn" onclick="showQR()">
        🌍 INTERNATIONAL PAYMENT
        </button>

        <div class="note">
        Pay first → then click SEND ORDER and attach screenshot proof.
        </div>
    </div>
</div>

<!-- Android -->
<div class="card">
    <img src="android-auxilio.png">

    <div class="content">
        <div class="title">Android Auxilio</div>
        <div class="price">$6.40</div>

        <input type="email" id="email2" class="input" placeholder="Enter your Gmail">

        <button class="btn"
        onclick="payNow('https://razorpay.me/@enjoymenthub?amount=%2FjgOm4sSt2cRPlGWeT7aQg%3D%3D')">
        💰 PAY NOW
        </button>

        <button class="btn" onclick="sendOrder('email2')">
        📩 SEND ORDER
        </button>

        <button class="btn" onclick="showQR()">
        🌍 INTERNATIONAL PAYMENT
        </button>

        <div class="note">
        Pay first → then click SEND ORDER and attach screenshot proof.
        </div>
    </div>
</div>

</div>

<!-- QR POPUP -->
<div class="popup" id="qrPopup">
  <div class="popup-box">
    <h3>Scan Binance QR</h3>
    <img src="qr.png">
    <br><br>
    <button onclick="closeQR()">Close</button>
  </div>
</div>

<script>
function payNow(link) {
    window.open(link, "_blank");
}

function sendOrder(emailId) {
    let email = document.getElementById(emailId).value;

    if (email === "" || !email.includes("@")) {
        alert("Enter valid Gmail!");
        return;
    }

    let yourEmail = "forenjoymenthub@gmail.com";

    let subject = "Payment Proof - Hokffx Store";
    let body = "Customer Gmail: " + email + 
               "\\n\\nI have completed payment. Sending screenshot proof.";

    window.location.href =
    `mailto:${yourEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

function showQR() {
    document.getElementById("qrPopup").style.display = "flex";
}

function closeQR() {
    document.getElementById("qrPopup").style.display = "none";
}
</script>

</body>
</html>
