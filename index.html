<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hokffx Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0a1f44, #020617 70%);
    color: white;
}

body::before {
    content: "";
    position: fixed;
    width: 600px;
    height: 600px;
    background: #7b00ff;
    filter: blur(250px);
    top: -200px;
    left: -200px;
    opacity: 0.4;
    z-index: -1;
}

/* HEADER */
.header {
    text-align: center;
    padding: 40px;
}

.header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 46px;
    font-weight: 900;
    letter-spacing: 3px;
    background: linear-gradient(90deg, #ffffff, #c084fc, #7b00ff);
    -webkit-background-clip: text;
    color: transparent;
}

/* CONTAINER */
.container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 25px;
    overflow: hidden;
    backdrop-filter: blur(20px);
    margin-bottom: 25px;
}

.card img {
    width: 100%;
}

/* CONTENT */
.content {
    padding: 20px;
}

.title {
    font-size: 22px;
}

.price {
    font-size: 28px;
    color: #c084fc;
}

/* INPUT */
.input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 20px;
    border: none;
    text-align: center;
}

/* BUTTON */
.btn {
    display: block;
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 25px;
    background: linear-gradient(135deg, #7b00ff, #c084fc);
    color: white;
    font-weight: bold;
    border: none;
    cursor: pointer;
}

/* NOTE */
.note {
    font-size: 12px;
    margin-top: 8px;
}

/* FAQ */
.faq {
    margin-top: 10px;
    cursor: pointer;
    color: #c084fc;
}

.answer {
    display: none;
    font-size: 13px;
    margin-top: 5px;
}

/* ❌ NO ANIMATION POPUP */
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    background: rgba(0,0,0,0.9);
}

/* CENTER BOX */
.popup-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    color: black;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

.popup img {
    width: 200px;
}
</style>
</head>

<body>

<div class="header">
    <h1>Hokffx Store</h1>
</div>

<div class="container">

<!-- iPhone -->
<div class="card">
    <img src="iphone-auxilio.png">
    <div class="content">
        <div class="title">iPhone Auxilio</div>
        <div class="price">$6.40</div>

        <input type="email" id="email1" class="input" placeholder="Enter your Gmail">

        <button class="btn" onclick="payNow()">💰 PAY NOW</button>
        <button class="btn" onclick="sendOrder('email1')">📩 SEND ORDER</button>
        <button class="btn" onclick="showQR()">🌍 INTERNATIONAL PAYMENT</button>

        <div class="note">Pay → then send proof</div>

        <div class="faq" onclick="toggleFAQ('faq1')">❓ Is that 100% safe?</div>
        <div class="answer" id="faq1">
        ✅ Safe & trusted<br>🔒 Secure payment<br>⚡ Fast delivery
        </div>
    </div>
</div>

<!-- Android -->
<div class="card">
    <img src="android-auxilio.png">
    <div class="content">
        <div class="title">Android Auxilio</div>
        <div class="price">$6.40</div>

        <input type="email" id="email2" class="input" placeholder="Enter your Gmail">

        <button class="btn" onclick="payNow()">💰 PAY NOW</button>
        <button class="btn" onclick="sendOrder('email2')">📩 SEND ORDER</button>
        <button class="btn" onclick="showQR()"> 🇺🇸 INTERNATIONAL PAYMENT</button>

        <div class="note">Pay → then send proof</div>

        <div class="faq" onclick="toggleFAQ('faq2')">❓ Is that 100% safe?</div>
        <div class="answer" id="faq2">
        ✅ Safe & trusted<br>🔒 Secure payment<br>⚡ Fast delivery
        </div>
    </div>
</div>

</div>

<!-- QR POPUP (NO ANIMATION) -->
<div class="popup" id="qrPopup">
  <div class="popup-box">
    <h3>Scan Binance QR</h3>
    <img src="qr.png">
    <br><br>
    <button onclick="closeQR()">Close</button>
  </div>
</div>

<script>
function payNow() {
    window.open("https://razorpay.me/@enjoymenthub?amount=%2FjgOm4sSt2cRPlGWeT7aQg%3D%3D");
}

function sendOrder(id) {
    let email = document.getElementById(id).value;
    if(email === "") {
        alert("Enter Gmail");
        return;
    }

    window.location.href =
    `mailto:forenjoymenthub@gmail.com?subject=Order&body=Email:${email}%0AProof attached`;
}

function showQR() {
    document.getElementById("qrPopup").style.display = "block";
}

function closeQR() {
    document.getElementById("qrPopup").style.display = "none";
}

function toggleFAQ(id) {
    let el = document.getElementById(id);
    el.style.display = el.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
