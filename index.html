<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hokffx Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #4c00ff, #0a001a 70%);
    color: white;
}

/* HEADER */
.header {
    text-align: center;
    padding: 40px 20px 20px;
}

.header p {
    color: #c084fc;
    letter-spacing: 4px;
    font-size: 12px;
}

.header h1 {
    font-size: 42px;
    font-weight: 800;
    background: linear-gradient(90deg, #ffffff, #d946ef, #7b00ff);
    -webkit-background-clip: text;
    color: transparent;
}

/* CONTAINER */
.container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 35px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 25px;
    overflow: hidden;
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
}

/* IMAGE */
.card img {
    width: 100%;
}

/* CONTENT */
.content {
    padding: 25px;
}

.title {
    font-size: 24px;
    font-weight: 600;
}

.price {
    font-size: 30px;
    font-weight: 800;
    color: #c084fc;
}

/* INPUT */
.input {
    margin-top: 15px;
    width: 100%;
    padding: 14px;
    border-radius: 30px;
    border: none;
    text-align: center;
}

/* BUTTON */
.btn {
    display: block;
    width: 100%;
    padding: 14px;
    border-radius: 30px;
    background: linear-gradient(135deg, #ff00cc, #7b00ff);
    color: white;
    text-align: center;
    margin-top: 10px;
    text-decoration: none;
}

/* INTERNATIONAL */
.intl {
    background: linear-gradient(135deg, #00c6ff, #0072ff);
}

/* NOTE */
.note {
    font-size: 12px;
    margin-top: 8px;
    color: #ccc;
}

/* POPUP */
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.8);
}

.popup-box {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

.popup img {
    width: 200px;
}
</style>
</head>

<body>

<div class="header">
    <p>👑 PREMIUM GAMING TOOLS 👑</p>
    <h1>Hokffx Store</h1>
</div>

<div class="container">

<!-- iPhone -->
<div class="card">
    <img src="iphone-auxilio.png">

    <div class="content">
        <div class="title">iPhone Auxilio</div>
        <div class="price">$6.40</div>

        <input type="email" id="email1" class="input" placeholder="Enter your Gmail">

        <!-- RAZORPAY -->
        <a href="#" class="btn"
        onclick="order('email1','https://razorpay.me/@enjoymenthub?amount=B3GVR7kTFeLelIPkLbK6rA%3D%3D')">
        🛒 BUY NOW
        </a>

        <!-- INTERNATIONAL -->
        <button class="btn intl" onclick="showQR()">🌍 International Payment</button>

        <div class="note">Send screenshot proof along with order</div>
    </div>
</div>

<!-- Android -->
<div class="card">
    <img src="android-auxilio.png">

    <div class="content">
        <div class="title">Android Auxilio</div>
        <div class="price">$6.40</div>

        <input type="email" id="email2" class="input" placeholder="Enter your Gmail">

        <a href="#" class="btn"
        onclick="order('email2','https://razorpay.me/@enjoymenthub?amount=xvXrjwbshe5hrsUjCd6Rig%3D%3D ')">
        🛒 BUY NOW
        </a>

        <button class="btn intl" onclick="showQR()">🌍 International Payment</button>

        <div class="note">Send screenshot proof along with order</div>
    </div>
</div>

</div>

<!-- QR POPUP -->
<div class="popup" id="qrPopup">
  <div class="popup-box">
    <h3>Scan Binance QR</h3>
    <img src="qr.png">
    <br><br>
    <button onclick="closeQR()">Close</button>
  </div>
</div>

<script>
function order(emailId, paymentLink) {
    let email = document.getElementById(emailId).value;

    if (email === "" || !email.includes("@")) {
        alert("Enter valid Gmail!");
        return;
    }

    let yourEmail = "forenjoymenthub@gmail.com";

    let subject = "New Order - Hokffx Store";
    let body = "Customer Gmail: " + email;

    window.location.href =
    `mailto:${yourEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

    setTimeout(() => {
        window.open(paymentLink, "_blank");
    }, 800);
}

function showQR() {
  document.getElementById("qrPopup").style.display = "flex";
}

function closeQR() {
  document.getElementById("qrPopup").style.display = "none";
}
</script>

</body>
</html>
