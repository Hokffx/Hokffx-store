<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hokffx Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;

    background: linear-gradient(
        180deg,
        #0b001a 0%,
        #3b008f 40%,
        #7b00ff 70%,
        #b266ff 100%
    );

    color: white;
}

/* HEADER */
.header {
    text-align: center;
    padding: 60px 20px 20px;
}

.header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 46px;
    background: linear-gradient(90deg, #fff, #e0aaff);
    -webkit-background-clip: text;
    color: transparent;
}

/* CONTAINER */
.container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
}

/* CARD */
.card {
    border-radius: 25px;
    overflow: hidden;
    margin-bottom: 25px;
    background: linear-gradient(180deg, #6a00ff, #3b008f);
}

.card img {
    width: 100%;
}

.content {
    padding: 25px;
}

.title {
    font-size: 24px;
    font-weight: 600;
}

/* PRICE */
.price-box {
    margin-top: 15px;
    display: flex;
    gap: 10px;
    align-items: center;
}

.old-price {
    text-decoration: line-through;
    color: #ddd;
    font-size: 18px;
}

.price {
    font-size: 34px;
    font-weight: 800;
    background: linear-gradient(90deg, #ff00cc, #ff66ff);
    -webkit-background-clip: text;
    color: transparent;
}

.access {
    margin-top: 8px;
    font-size: 12px;
    letter-spacing: 3px;
}

/* INPUT */
.input {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border-radius: 30px;
    border: none;
    text-align: center;
}

/* BUTTON */
.btn {
    display: block;
    width: 100%;
    padding: 15px;
    margin-top: 12px;
    border-radius: 30px;
    background: linear-gradient(135deg, #7b00ff, #c084fc);
    color: white;
    border: none;
    cursor: pointer;
    font-weight: 600;
}

/* NOTE */
.note {
    font-size: 12px;
    margin-top: 10px;
    text-align: center;
}

/* POPUP */
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.9);
}

.popup-box {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

.popup img {
    width: 200px;
}
</style>
</head>

<body>

<div class="header">
    <h1>Hokffx Store</h1>
</div>

<div class="container">

<!-- iPhone -->
<div class="card">
    <img src="iphone.png">

    <div class="content">
        <div class="title">iPhone Auxilio</div>

        <div class="price-box">
            <span class="old-price">$12</span>
            <span class="price">₹400</span>
        </div>

        <div class="access">PERMANENT ACCESS</div>

        <input type="email" id="email1" class="input" placeholder="Enter your Gmail">

        <button class="btn" onclick="payNow('iphone')">💰 PAY NOW</button>
        <button class="btn" onclick="sendOrder('email1')">📩 SEND ORDER</button>
        <button class="btn" onclick="showQR('iphone')"> 🇺🇸 INTERNATIONAL PAYMENT</button>

        <div class="note">
        send screenshot proof of payment along with order through Gmail
        </div>
    </div>
</div>

<!-- Android -->
<div class="card">
    <img src="android.png">

    <div class="content">
        <div class="title">Android Auxilio</div>

        <div class="price-box">
            <span class="old-price">$8</span>
            <span class="price">₹259</span>
        </div>

        <div class="access">PERMANENT ACCESS</div>

        <input type="email" id="email2" class="input" placeholder="Enter your Gmail">

        <button class="btn" onclick="payNow('android')">💰 PAY NOW</button>
        <button class="btn" onclick="sendOrder('email2')">📩 SEND ORDER</button>
        <button class="btn" onclick="showQR('android')"> 🇺🇸 INTERNATIONAL PAYMENT</button>

        <div class="note">
        send screenshot proof of payment along with order through Gmail
        </div>
    </div>
</div>

</div>

<!-- QR POPUP -->
<div class="popup" id="qrPopup">
  <div class="popup-box">
    <h3 id="qrTitle">Scan QR</h3>
    <img id="qrImage" src="">
    <br><br>
    <button onclick="closeQR()">Close</button>
  </div>
</div>

<script>

// ✅ CLEAN RAZORPAY LINKS
function payNow(type) {

    alert("Redirecting to secure payment...");

    if(type === "iphone"){
        window.open("https://razorpay.me/@enjoymenthub?amount=GjiZndswUahjxyGDJCJTMw%3D%3D", "_blank");
    }

    if(type === "android"){
        window.open("https://razorpay.me/@enjoymenthub?amount=Jj1Ou5Z3lOrBsaQbgPDcMA%3D%3D", "_blank");
    }
}

// SEND ORDER
function sendOrder(id) {
    let email = document.getElementById(id).value;
    if(email === "") {
        alert("Enter Gmail");
        return;
    }

    window.location.href =
    `mailto:forenjoymenthub@gmail.com?subject=Order&body=Email:${email}%0AProof attached`;
}

// QR
function showQR(type) {
    let img = document.getElementById("qrImage");
    let title = document.getElementById("qrTitle");

    if(type === "iphone"){
        img.src = "iphone-qr.png";
        title.innerText = "iPhone Payment QR";
    }

    if(type === "android"){
        img.src = "android-qr.png";
        title.innerText = "Android Payment QR";
    }

    document.getElementById("qrPopup").style.display = "flex";
}

function closeQR() {
    document.getElementById("qrPopup").style.display = "none";
}

</script>

</body>
</html>
